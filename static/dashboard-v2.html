<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Visão Operacional - HubProdutividade</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#07090c;--s1:#0d1117;--s2:#131920;--border:#1e2731;
  --text:#c9d4e0;--muted:#46586a;
  --cyan:#00d4ff;--green:#00e5a0;--red:#ff4d6a;--amber:#ffb83f;--orange:#ff7849;--purple:#a78bfa;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Bricolage Grotesque',sans-serif;display:flex;flex-direction:column;padding:20px}

/* ══════════════════════════════════════════════
   FILTROS
   ══════════════════════════════════════════════ */
.filtros-container{
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:12px;
  padding:18px 22px;
  margin-bottom:20px;
  display:flex;
  gap:14px;
  flex-wrap:wrap;
  align-items:center;
}

.filtro-group{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.filtro-label{
  font-size:10px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.1em;
  font-weight:700;
}

.filtro-input{
  background:var(--s2);
  border:1px solid var(--border);
  color:var(--text);
  padding:8px 12px;
  border-radius:7px;
  font-size:13px;
  font-family:'DM Mono',monospace;
  min-width:140px;
  transition:all .2s;
}

.filtro-input:focus{
  outline:none;
  border-color:var(--cyan);
  box-shadow:0 0 0 3px rgba(0,212,255,.1);
}

.filtro-input:disabled{
  opacity:.5;
  cursor:not-allowed;
}

.btn-filtro{
  background:var(--s2);
  border:1px solid var(--border);
  color:var(--muted);
  padding:8px 14px;
  border-radius:7px;
  cursor:pointer;
  font-size:12px;
  font-weight:600;
  font-family:'Bricolage Grotesque',sans-serif;
  transition:all .2s;
  white-space:nowrap;
}

.btn-filtro:hover{
  border-color:var(--cyan);
  color:var(--cyan);
}

.btn-filtro.active{
  background:rgba(0,212,255,.12);
  border-color:var(--cyan);
  color:var(--cyan);
}

.btn-hoje{
  background:rgba(0,212,255,.1);
  border:1px solid rgba(0,212,255,.2);
  color:var(--cyan);
  padding:8px 16px;
  border-radius:7px;
  cursor:pointer;
  font-size:12px;
  font-weight:700;
  font-family:'Bricolage Grotesque',sans-serif;
  transition:all .2s;
}

.btn-hoje:hover{
  background:rgba(0,212,255,.18);
}

.btn-aplicar{
  background:linear-gradient(135deg,var(--cyan),#0060ff);
  border:none;
  color:#fff;
  padding:8px 20px;
  border-radius:7px;
  cursor:pointer;
  font-size:12px;
  font-weight:700;
  font-family:'Bricolage Grotesque',sans-serif;
  transition:all .2s;
  margin-left:auto;
}

.btn-aplicar:hover{
  transform:translateY(-1px);
  box-shadow:0 4px 12px rgba(0,212,255,.3);
}

.filtros-status{
  display:flex;
  gap:6px;
}

/* ══════════════════════════════════════════════
   ALERTAS
   ══════════════════════════════════════════════ */
.alerts{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:18px;
}

.alert-chip{
  padding:6px 14px;
  border-radius:6px;
  font-size:11px;
  font-weight:700;
  letter-spacing:.04em;
  border:1px solid;
  display:flex;
  align-items:center;
  gap:6px;
}

.alert-chip.red{
  background:rgba(255,77,106,.07);
  border-color:rgba(255,77,106,.22);
  color:var(--red);
}

.alert-chip.amber{
  background:rgba(255,184,63,.07);
  border-color:rgba(255,184,63,.22);
  color:var(--amber);
}

.alert-chip.green{
  background:rgba(0,229,160,.07);
  border-color:rgba(0,229,160,.22);
  color:var(--green);
}

/* ══════════════════════════════════════════════
   KPIS
   ══════════════════════════════════════════════ */
.kpi-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
  margin-bottom:20px;
}

.kpi{
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:11px;
  padding:18px 16px;
  position:relative;
  overflow:hidden;
  transition:all .2s;
}

.kpi:hover{
  transform:translateY(-2px);
  border-color:rgba(255,255,255,.08);
}

.kpi::before{
  content:'';
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:3px;
  background:var(--ac,var(--cyan));
}

.kpi-lbl{
  font-size:10px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.12em;
  font-weight:700;
  margin-bottom:10px;
}

.kpi-val{
  font-size:28px;
  font-weight:800;
  font-family:'DM Mono',monospace;
  color:var(--ac,var(--cyan));
  line-height:1;
}

.kpi-sub{
  font-size:11px;
  color:var(--muted);
  margin-top:6px;
}

.kpi-trend{
  position:absolute;
  top:16px;
  right:14px;
  font-size:10px;
  font-family:'DM Mono',monospace;
  padding:3px 7px;
  border-radius:5px;
}

.kpi-trend.up{
  background:rgba(0,229,160,.12);
  color:var(--green);
}

.kpi-trend.dn{
  background:rgba(255,77,106,.12);
  color:var(--red);
}

/* ══════════════════════════════════════════════
   CARDS
   ══════════════════════════════════════════════ */
.card-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  margin-bottom:20px;
}

.card{
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:11px;
  padding:20px;
}

.card-head{
  font-size:10px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:.12em;
  color:var(--muted);
  margin-bottom:18px;
  display:flex;
  align-items:center;
  gap:8px;
}

.card-head::after{
  content:'';
  flex:1;
  height:1px;
  background:var(--border);
}

/* Categoria clicável */
.cat-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 12px;
  margin-bottom:8px;
  border-radius:7px;
  transition:all .2s;
  cursor:pointer;
  border:1px solid transparent;
}

.cat-item:hover{
  background:rgba(255,255,255,.03);
  border-color:rgba(255,255,255,.05);
}

.cat-item-nome{
  font-size:13px;
  font-weight:600;
}

.cat-item-valor{
  font-family:'DM Mono',monospace;
  font-size:13px;
  font-weight:700;
}

.cat-bar{
  height:4px;
  background:var(--border);
  border-radius:4px;
  margin-top:6px;
  overflow:hidden;
}

.cat-bar-fill{
  height:4px;
  border-radius:4px;
  transition:width .8s cubic-bezier(.4,0,.2,1);
}

/* Top Técnicos */
.tec-item{
  display:flex;
  align-items:center;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,.025);
  cursor:pointer;
  transition:all .2s;
}

.tec-item:hover{
  background:rgba(255,255,255,.02);
  padding-left:8px;
}

.tec-item:last-child{
  border-bottom:none;
}

.tec-pos{
  display:inline-flex;
  width:24px;
  height:24px;
  align-items:center;
  justify-content:center;
  border-radius:6px;
  font-size:10px;
  font-weight:800;
  font-family:'DM Mono',monospace;
  margin-right:10px;
  flex-shrink:0;
}

.tec-pos.p1{background:rgba(255,184,63,.15);color:var(--amber)}
.tec-pos.p2{background:rgba(0,212,255,.1);color:var(--cyan)}
.tec-pos.p3{background:rgba(0,229,160,.08);color:var(--green)}
.tec-pos.pn{background:var(--border);color:var(--muted)}

.tec-nome{
  flex:1;
  font-size:13px;
  font-weight:600;
}

.tec-os{
  font-family:'DM Mono',monospace;
  font-size:12px;
  color:var(--cyan);
  font-weight:700;
  margin-right:12px;
}

.badge{
  display:inline-block;
  padding:3px 8px;
  border-radius:5px;
  font-size:10px;
  font-weight:700;
  font-family:'DM Mono',monospace;
}

.badge.green{background:rgba(0,229,160,.1);color:var(--green)}
.badge.amber{background:rgba(255,184,63,.1);color:var(--amber)}
.badge.red{background:rgba(255,77,106,.1);color:var(--red)}

/* ══════════════════════════════════════════════
   MODAL
   ══════════════════════════════════════════════ */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  backdrop-filter:blur(4px);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  animation:fadeIn .2s ease;
}

.modal-overlay.active{
  display:flex;
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

.modal{
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:14px;
  width:90%;
  max-width:700px;
  max-height:80vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  animation:slideUp .3s cubic-bezier(.4,0,.2,1);
}

@keyframes slideUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

.modal-header{
  padding:20px 24px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.modal-title{
  font-size:16px;
  font-weight:800;
  letter-spacing:-.01em;
}

.modal-close{
  background:var(--s2);
  border:1px solid var(--border);
  color:var(--muted);
  width:32px;
  height:32px;
  border-radius:8px;
  display:grid;
  place-items:center;
  cursor:pointer;
  font-size:18px;
  transition:all .2s;
}

.modal-close:hover{
  border-color:var(--red);
  color:var(--red);
}

.modal-body{
  padding:20px 24px;
  overflow-y:auto;
  flex:1;
}

.modal-body::-webkit-scrollbar{
  width:6px;
}

.modal-body::-webkit-scrollbar-thumb{
  background:var(--border);
  border-radius:6px;
}

/* Lista de OS */
.os-item{
  background:var(--s2);
  border:1px solid var(--border);
  border-radius:8px;
  padding:14px 16px;
  margin-bottom:10px;
  transition:all .2s;
}

.os-item:hover{
  border-color:rgba(0,212,255,.3);
  transform:translateX(2px);
}

.os-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:8px;
}

.os-id{
  font-family:'DM Mono',monospace;
  font-size:13px;
  font-weight:700;
  color:var(--cyan);
}

.os-status{
  font-size:10px;
  padding:3px 8px;
  border-radius:4px;
  font-weight:700;
  text-transform:uppercase;
}

.os-status.finalizada{background:rgba(0,229,160,.12);color:var(--green)}
.os-status.execucao{background:rgba(255,184,63,.12);color:var(--amber)}
.os-status.agendada{background:rgba(0,212,255,.12);color:var(--cyan)}

.os-info{
  font-size:11px;
  color:var(--muted);
  display:flex;
  gap:12px;
}

.loading{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px;
  color:var(--muted);
  font-size:12px;
  font-family:'DM Mono',monospace;
}

.spinner{
  width:18px;
  height:18px;
  border:2px solid var(--border);
  border-top-color:var(--cyan);
  border-radius:50%;
  animation:spin .7s linear infinite;
  margin-right:10px;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

@media(max-width:1200px){
  .kpi-grid{grid-template-columns:repeat(3,1fr)}
  .card-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- FILTROS -->
<div class="filtros-container">
  <div class="filtro-group">
    <label class="filtro-label">Data Início</label>
    <input type="date" id="filtro-data-inicio" class="filtro-input"/>
  </div>
  
  <div class="filtro-group">
    <label class="filtro-label">Data Fim</label>
    <input type="date" id="filtro-data-fim" class="filtro-input"/>
  </div>
  
  <button class="btn-hoje" onclick="setHoje()">📅 Hoje</button>
  
  <div class="filtro-group">
    <label class="filtro-label">Status</label>
    <div class="filtros-status">
      <button class="btn-filtro active" data-status="finalizada">✅ Finalizada</button>
      <button class="btn-filtro" data-status="agendada">📅 Agendada</button>
      <button class="btn-filtro" data-status="aguardando">⏳ Aguardando</button>
      <button class="btn-filtro" data-status="execucao">🔄 Execução</button>
    </div>
  </div>
  
  <button class="btn-aplicar" onclick="aplicarFiltros()">🔍 Aplicar Filtros</button>
</div>

<!-- ALERTAS -->
<div class="alerts" id="alertas-container"></div>

<!-- KPIS -->
<div class="kpi-grid" id="kpis-container">
  <div class="loading"><div class="spinner"></div>Carregando...</div>
</div>

<!-- CARDS -->
<div class="card-grid">
  <!-- OS por Categoria -->
  <div class="card">
    <div class="card-head">📊 OS POR CATEGORIA</div>
    <div id="categorias-container"></div>
  </div>
  
  <!-- Top Técnicos -->
  <div class="card">
    <div class="card-head">🏆 TOP TÉCNICOS HOJE</div>
    <div id="tecnicos-container"></div>
  </div>
</div>

<!-- MODAL: Técnicos por Categoria -->
<div class="modal-overlay" id="modal-categoria">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-categoria-title">Serviço - Técnicos</div>
      <button class="modal-close" onclick="closeModal('modal-categoria')">×</button>
    </div>
    <div class="modal-body" id="modal-categoria-body">
      <div class="loading"><div class="spinner"></div>Carregando...</div>
    </div>
  </div>
</div>

<!-- MODAL: OS do Técnico -->
<div class="modal-overlay" id="modal-tecnico">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-tecnico-title">OS - LEANDRO</div>
      <button class="modal-close" onclick="closeModal('modal-tecnico')">×</button>
    </div>
    <div class="modal-body" id="modal-tecnico-body">
      <div class="loading"><div class="spinner"></div>Carregando...</div>
    </div>
  </div>
</div>

<script>
const API = '/api/dashboard/v2';
let filtrosAtivos = {
  data_inicio: null,
  data_fim: null,
  status: ['finalizada'],
  categorias: []
};

// ═══════════════════════════════════════════════════════
// INICIALIZAÇÃO
// ═══════════════════════════════════════════════════════
window.onload = () => {
  setHoje();
  aplicarFiltros();
  setupFiltrosStatus();
};

// ═══════════════════════════════════════════════════════
// FILTROS
// ═══════════════════════════════════════════════════════
function setHoje(){
  const hoje = new Date().toISOString().split('T')[0];
  document.getElementById('filtro-data-inicio').value = hoje;
  document.getElementById('filtro-data-fim').value = hoje;
}

function setupFiltrosStatus(){
  document.querySelectorAll('.btn-filtro[data-status]').forEach(btn => {
    btn.onclick = () => {
      btn.classList.toggle('active');
      // Não aplica automaticamente, apenas marca
    };
  });
}

function aplicarFiltros(){
  // Coletar filtros
  filtrosAtivos.data_inicio = document.getElementById('filtro-data-inicio').value || null;
  filtrosAtivos.data_fim = document.getElementById('filtro-data-fim').value || null;
  
  // Status ativos
  const statusSelecionados = [];
  document.querySelectorAll('.btn-filtro[data-status].active').forEach(btn => {
    statusSelecionados.push(btn.dataset.status);
  });
  filtrosAtivos.status = statusSelecionados;
  
  // Recarregar tudo
  carregarDados();
}

// ═══════════════════════════════════════════════════════
// CARREGAR DADOS
// ═══════════════════════════════════════════════════════
async function carregarDados(){
  await Promise.all([
    carregarAlertas(),
    carregarResumo(),
    carregarCategorias()
  ]);
}

async function carregarAlertas(){
  const params = new URLSearchParams();
  if(filtrosAtivos.data_inicio) params.set('data_inicio', filtrosAtivos.data_inicio);
  if(filtrosAtivos.data_fim) params.set('data_fim', filtrosAtivos.data_fim);
  
  const r = await fetch(`${API}/alertas?${params}`);
  const data = await r.json();
  
  const container = document.getElementById('alertas-container');
  container.innerHTML = data.alertas.map(a => 
    `<div class="alert-chip ${a.cor}">${a.mensagem}</div>`
  ).join('');
}

async function carregarResumo(){
  const params = buildParams();
  const r = await fetch(`${API}/resumo?${params}`);
  const data = await r.json();
  const res = data.resumo;
  const meta = data.meta_dia;
  const pctMeta = data.meta_percentual;
  
  document.getElementById('kpis-container').innerHTML = `
    <div class="kpi" style="--ac:var(--cyan)">
      <div class="kpi-lbl">Total OS</div>
      <div class="kpi-val">${res.total||0}</div>
      <div class="kpi-sub">no período</div>
    </div>
    <div class="kpi" style="--ac:var(--green)">
      <div class="kpi-lbl">Finalizadas</div>
      <div class="kpi-val">${res.finalizadas||0}</div>
      <div class="kpi-sub">${pctMeta}% da meta</div>
      <div class="kpi-trend ${pctMeta>=80?'up':'dn'}">${pctMeta}%</div>
    </div>
    <div class="kpi" style="--ac:var(--amber)">
      <div class="kpi-lbl">Em Execução</div>
      <div class="kpi-val">${res.execucao||0}</div>
      <div class="kpi-sub">em campo</div>
    </div>
    <div class="kpi" style="--ac:var(--purple)">
      <div class="kpi-lbl">Eficiência</div>
      <div class="kpi-val">${data.eficiencia||0}%</div>
      <div class="kpi-sub">fin/total</div>
    </div>
    <div class="kpi" style="--ac:var(--orange)">
      <div class="kpi-lbl">Meta Dia</div>
      <div class="kpi-val">${meta}</div>
      <div class="kpi-sub">faltam ${Math.max(0,meta-(res.finalizadas||0))}</div>
    </div>
  `;
}

async function carregarCategorias(){
  const params = buildParams();
  const r = await fetch(`${API}/resumo?${params}`);
  const data = await r.json();
  const res = data.resumo;
  
  const cats = [
    {nome:'Serviço', key:'servicos', cor:'#00d4ff'},
    {nome:'Suporte', key:'suportes', cor:'#ffb83f'},
    {nome:'Infra', key:'infra', cor:'#a78bfa'},
    {nome:'Retirada', key:'retiradas', cor:'#ff7849'}
  ];
  
  const maxVal = Math.max(...cats.map(c=>res[c.key]||0), 1);
  
  document.getElementById('categorias-container').innerHTML = cats.map(c=>{
    const val = res[c.key]||0;
    const pct = Math.round(val/maxVal*100);
    return `
      <div class="cat-item" onclick="abrirModalCategoria('${c.key}','${c.nome}')">
        <div class="cat-item-nome">${c.nome}</div>
        <div class="cat-item-valor" style="color:${c.cor}">${val}</div>
      </div>
      <div class="cat-bar">
        <div class="cat-bar-fill" style="width:${pct}%;background:${c.cor}"></div>
      </div>
    `;
  }).join('');
  
  // Top Técnicos (mock - implementar endpoint específico se necessário)
  carregarTopTecnicos();
}

async function carregarTopTecnicos(){
  // Por enquanto, vou buscar do resumo geral
  // Você pode criar um endpoint específico depois
  document.getElementById('tecnicos-container').innerHTML = `
    <div class="loading"><div class="spinner"></div>Implementar endpoint /top-tecnicos</div>
  `;
}

// ═══════════════════════════════════════════════════════
// MODALS
// ═══════════════════════════════════════════════════════
async function abrirModalCategoria(categoria, nome){
  const modal = document.getElementById('modal-categoria');
  document.getElementById('modal-categoria-title').textContent = `${nome} - Técnicos`;
  modal.classList.add('active');
  
  const params = buildParams();
  const r = await fetch(`${API}/categoria/${categoria}/tecnicos?${params}`);
  const data = await r.json();
  
  const body = document.getElementById('modal-categoria-body');
  body.innerHTML = data.tecnicos.map((t,i)=>`
    <div class="tec-item" onclick="abrirModalTecnico(${t.id},'${t.nome}','${categoria}')">
      <div class="tec-pos ${i<3?'p'+(i+1):'pn'}">${i+1}</div>
      <div class="tec-nome">${t.nome}</div>
      <div class="tec-os">${t.total_os} OS</div>
      <div class="badge ${t.percentual_finalizacao>=80?'green':'amber'}">${t.percentual_finalizacao}%</div>
    </div>
  `).join('');
}

async function abrirModalTecnico(tecnicoId, tecnicoNome, categoria){
  const modal = document.getElementById('modal-tecnico');
  document.getElementById('modal-tecnico-title').textContent = `OS - ${tecnicoNome}`;
  modal.classList.add('active');
  
  const params = buildParams();
  params.set('categoria', categoria);
  const r = await fetch(`${API}/tecnico/${tecnicoId}/os?${params}`);
  const data = await r.json();
  
  const body = document.getElementById('modal-tecnico-body');
  body.innerHTML = data.os_list.map(os=>`
    <div class="os-item">
      <div class="os-header">
        <div class="os-id">OS #${os.os_id}</div>
        <div class="os-status ${os.status}">${os.status}</div>
      </div>
      <div class="os-info">
        <span>📂 ${os.categoria}</span>
        <span>📅 ${formatDate(os.data_fechamento)}</span>
        <span>🔖 Assunto ${os.assunto_id}</span>
      </div>
    </div>
  `).join('');
}

function closeModal(id){
  document.getElementById(id).classList.remove('active');
}

// ═══════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════
function buildParams(){
  const p = new URLSearchParams();
  if(filtrosAtivos.data_inicio) p.set('data_inicio', filtrosAtivos.data_inicio);
  if(filtrosAtivos.data_fim) p.set('data_fim', filtrosAtivos.data_fim);
  if(filtrosAtivos.status && filtrosAtivos.status.length>0) p.set('status', filtrosAtivos.status.join(','));
  return p;
}

function formatDate(d){
  if(!d) return '-';
  return new Date(d).toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
}

// Fechar modal ao clicar fora
document.querySelectorAll('.modal-overlay').forEach(overlay=>{
  overlay.onclick = (e) => {
    if(e.target === overlay) overlay.classList.remove('active');
  };
});
</script>
</body>
</html>
